name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  BINARY_NAME: hanan

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-x86_64
          - os: windows-latest
            asset_name: windows-x86_64
          - os: macos-latest
            asset_name: macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.2.1

      - name: Build
        run: hanan run build

      - name: Zip binary (Unix)
        if: runner.os != 'Windows'
        working-directory: dist
        run: zip -j ../${{ env.BINARY_NAME }}-${{ matrix.asset_name }}.zip *

      - name: Zip binary (Windows)
        if: runner.os == 'Windows'
        working-directory: dist
        run: Compress-Archive -Path * -DestinationPath ../${{ env.BINARY_NAME }}-${{ matrix.asset_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.asset_name }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.asset_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}